# Build the SSCIM site (landing page, guide, and dashboard — all three are React
# pages built from app/) and deploy it to GitHub Pages.
#
# IMPORTANT: this only deploys the frontend. The dashboard fetches its data from the
# server/ API at runtime (see README §6/§10) — that backend is NOT deployed by this
# workflow (GitHub Pages is static-hosting only) and must be hosted separately (Render,
# Fly.io, Railway, a VPS, etc.). Set the VITE_API_BASE_URL repository variable (Settings
# → Secrets and variables → Actions → Variables) to that backend's public URL before
# relying on this deployment — without it, the deployed dashboard falls back to
# http://localhost:8787 and will show its "can't reach the vault API" error screen.
name: Build and deploy to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm install

      - name: Build site (landing + intro + dashboard)
        working-directory: app
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-app

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
