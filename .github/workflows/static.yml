# Build the SSCIM site (landing page, guide, and dashboard — all three are React
# pages built from app/) and deploy it to GitHub Pages.
#
# Data comes from the committed SQLite database (server/data/sscim.db): the build
# exports it into app/src/data/vault-snapshot.json (app/scripts/
# build-vault-snapshot.mjs, run automatically by "prebuild") and bundles that
# snapshot into the static site. Updating the deployed data = edit the vault
# locally (admin API or SQL), run `npm run snapshot` in app/, commit the updated
# .db, and push.
#
# GitHub Pages is static-hosting only, so the Express backend itself does not run
# here — it's for local editing, or optionally hostable elsewhere (Render, Fly.io,
# a VPS, …). If you do host it, set the VITE_API_BASE_URL repository variable
# (Settings → Secrets and variables → Actions → Variables) to its public URL and
# the deployed dashboard will fetch live data instead of the bundled snapshot.
name: Build and deploy to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Daily rebuild so the bundled stock quotes (price/PE) stay fresh on the
    # static deploy even without a commit — see "Refresh stock quotes" below.
    - cron: "0 6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            server/package-lock.json

      # better-sqlite3 lives here — the snapshot export reads the committed
      # database through the server's own db/bundle modules.
      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      # Best-effort: pull current prices + P/E into the quotes table before the
      # export, so the deployed site carries quotes as of this build. On failure
      # (rate limit, endpoint change) the build proceeds with the quotes already
      # committed in the database — quotes are display metadata, never engine input.
      - name: Refresh stock quotes (best-effort)
        working-directory: server
        run: node scripts/fetch-quotes.mjs || echo "::warning::Quote refresh failed — deploying with committed quotes."

      - name: Export vault snapshot from database
        working-directory: app
        run: npm run snapshot

      # Read-only diagnostic over the exported snapshot — fails the build on
      # malformed data (dangling references, non-finite values, out-of-range
      # shares, an invalid stage graph); see app/scripts/audit-snapshot.mjs.
      - name: Audit data snapshot
        working-directory: app
        run: npm run audit:data

      - name: Run unit tests
        working-directory: app
        run: npm test

      - name: Build site (landing + intro + dashboard)
        working-directory: app
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-app

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
